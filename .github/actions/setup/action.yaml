name: Run SAS Setup
description: Creates neccessary files and runs setup scripts.
inputs:
  language:
    description: Either de or en
    required: true
  shell:
    description: Shell to use
    required: true

runs:
  using: "composite"

  steps:
    - name: Platform specific env (Linux)
      if: runner.os == 'Linux'
      shell: ${{ inputs.shell }}
      run: |
        echo MY_ENV=$GITHUB_ENV >> $GITHUB_ENV
        
        echo SASUNIT_HOST_OS=linux >> $GITHUB_ENV
        echo SASUNIT_HOST_ENCODING=UTF8 >> $GITHUB_ENV

    - name:  Platform specific env (Windows)
      shell: ${{ inputs.shell }}
      if: runner.os == 'Windows'
      run: |
        echo MY_ENV=$Env:GITHUB_ENV >> $Env:GITHUB_ENV
        echo SASUNIT_HOST_OS=windows >> $Env:GITHUB_ENV
        echo SASUNIT_HOST_ENCODING=PCOEM850 >> $Env:GITHUB_ENV

    - name: Set General Env 
      shell: ${{ inputs.shell }}
      run: |
        echo SASUNIT_SAS_VERSION=9.4 >> ${{ env.MY_ENV }}
        echo SASUNIT_LANGUAGE=${{ inputs.language }} >> ${{ env.MY_ENV }}
        echo SASUNIT_ROOT=${{ env.WORKSPACE}} >> ${{ env.MY_ENV }}
        echo SASUNIT_PROJECTROOT=${{ env.WORKSPACE}} >> ${{ env.MY_ENV }}
        echo SASUNIT_LOG_LEVEL=INFO >> ${{ env.MY_ENV }}
        echo SASUNIT_SCN_LOG_LEVEL=INFO >> ${{ env.MY_ENV }}

    - name: Set paths (Linux)
      if: runner.os == 'Linux'
      shell: ${{ inputs.shell }}
      run: |
       echo SASUNIT_SAS_EXE=/opt/sas/sas94M7/SASFoundation/${{ env.SASUNIT_SAS_VERSION }}/bin/sas_${{ env.SASUNIT_LANGUAGE }} >> ${{ env.MY_ENV }}
       echo SASUNIT_SAS_CFG=/opt/sas/sas94M7/SASFoundation/${{ env.SASUNIT_SAS_VERSION }}/nls/${{ env.SASUNIT_LANGUAGE }}/sasv9.cfg >> ${{ env.MY_ENV }}

    - name: Set paths (Windows)
      if: runner.os == 'Windows'
      shell: ${{ inputs.shell }}
      run: |
       echo SASUNIT_SAS_EXE="C:/Program` Files/SASHome2/SASFoundation/${{ env.SASUNIT_SAS_VERSION }}/sas.exe" >> $Env:GITHUB_ENV
       echo SASUNIT_SAS_CFG="C:/Program` Files/SASHome2/SASFoundation/${{ env.SASUNIT_SAS_VERSION }}/nls/${{ env.SASUNIT_LANGUAGE }}/sasv9.cfg" >> $Env:GITHUB_ENV

    - name: Set paths (General)
      shell: ${{ inputs.shell }}
      run: | 
       echo SASUNIT_TESTDB_PATH=${{ env.SASUNIT_PROJECTROOT }}/${{ env.SASUNIT_LANGUAGE }}/testdb >> ${{ env.MY_ENV }}
       echo SASUNIT_LOG_PATH=${{ env.SASUNIT_PROJECTROOT }}/${{ env.SASUNIT_LANGUAGE }}/logs >> ${{ env.MY_ENV }}
       echo SASUNIT_SCN_LOG_PATH=${{ env.SASUNIT_PROJECTROOT }}/${{ env.SASUNIT_LANGUAGE }}/scn_logs >> ${{ env.MY_ENV }}
       echo SASUNIT_REPORT_PATH=${{ env.SASUNIT_PROJECTROOT }}/${{ env.SASUNIT_LANGUAGE }}/doc >> ${{ env.MY_ENV }}
       echo SASUNIT_RESOURCE_PATH=${{ env.SASUNIT_ROOT }}/resources >> ${{ env.MY_ENV }}
       echo SASUNIT_RUNALL=${{ env.SASUNIT_PROJECTROOT }}/saspgm/test/run_all.sas >> ${{ env.MY_ENV }}
    
    - name: Creating script files for starting SASUnit (Linux)
      if: runner.os == 'Linux'
      shell: ${{ inputs.shell }}
      run: |
        $SASUNIT_SAS_EXE -nosyntaxcheck -noovp -log "$SASUNIT_PROJECTROOT/bin/sasunit.setup.$SASUNIT_SAS_VERSION.$SASUNIT_LANGUAGE.log" -sysin "$SASUNIT_ROOT/saspgm/sasunit/runsasunitsetup.sas"

    - name: Creating script files for starting SASUnit (Windows)
      if: runner.os == 'Windows'
      shell: ${{ inputs.shell }}
      run: |
        Invoke-Expression -Command '${{ env.SASUNIT_SAS_EXE }} -CONFIG "${{ env.SASUNIT_SAS_CFG }}" -no$syntaxcheck -noovp -nosplash -log "${{env.SASUNIT_PROJECTROOT}}/bin/sasunit.setup.${{env.SASUNIT_SAS_VERSION}}.${{env.SASUNIT_LANGUAGE}}.log" -sysin "${{ env.SASUNIT_ROOT }}/saspgm/sasunit/runsasunitsetup.sas"'
