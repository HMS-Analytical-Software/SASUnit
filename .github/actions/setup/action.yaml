name: Run SAS Setup
description: Creates neccessary files and runs setup scripts.
inputs:
  language:
    description: Either de or en
    required: true
  shell:
    description: Shell to use
    required: true

runs:
  using: "composite"

  steps:
    # TODO Find a way to use the same script for both platforms
    - name: Set General Env (Linux)
      shell: ${{ inputs.shell }}
      if: runner.os == 'Linux'
      run: |
        echo SASUNIT_HOST_OS=linux >> $GITHUB_ENV
        echo SASUNIT_HOST_ENCODING=UTF8 >> $GITHUB_ENV
        echo SASUNIT_SAS_VERSION=9.4 >> $GITHUB_ENV
        echo SASUNIT_LANGUAGE=${{ inputs.language }} >> $GITHUB_ENV
        echo SASUNIT_ROOT=$WORKSPACE >> $GITHUB_ENV
        echo SASUNIT_PROJECTROOT=$WORKSPACE >> $GITHUB_ENV
        echo SASUNIT_LOG_LEVEL=INFO >> $GITHUB_ENV
        echo SASUNIT_SCN_LOG_LEVEL=INFO >> $GITHUB_ENV

    - name: Set General Env (Windows)
      shell: ${{ inputs.shell }}
      if: runner.os == 'Windows'
      run: |
        echo SASUNIT_HOST_OS=windows >> $Env:GITHUB_ENV
        echo SASUNIT_HOST_ENCODING=PCOEM850 >> $Env:GITHUB_ENV
        echo SASUNIT_SAS_VERSION=9.4 >> $Env:GITHUB_ENV

        echo SASUNIT_LANGUAGE=${{ inputs.language }} >> $Env:GITHUB_ENV
        echo SASUNIT_ROOT=$Env:WORKSPACE >> $Env:GITHUB_ENV
        echo SASUNIT_PROJECTROOT=$Env:WORKSPACE >> $Env:GITHUB_ENV
        echo SASUNIT_LOG_LEVEL=INFO >> $Env:GITHUB_ENV
        echo SASUNIT_SCN_LOG_LEVEL=INFO >> $Env:GITHUB_ENV

    - name: Set paths (Linux)
      if: runner.os == 'Linux'
      shell: ${{ inputs.shell }}
      run: |
       echo SASUNIT_SAS_EXE=/opt/sas/sas94M7/SASFoundation/$SASUNIT_SAS_VERSION/bin/sas_${{ inputs.language }} >> $GITHUB_ENV
       echo SASUNIT_SAS_CFG=/opt/sas/sas94M7/SASFoundation/$SASUNIT_SAS_VERSION/nls/${{ inputs.language }}/sasv9.cfg >> $GITHUB_ENV
       echo SASUNIT_TESTDB_PATH=$SASUNIT_PROJECTROOT/${{ inputs.language }}/testdb >> $GITHUB_ENV
       echo SASUNIT_LOG_PATH=$SASUNIT_PROJECTROOT/${{ inputs.language }}/logs >> $GITHUB_ENV
       echo SASUNIT_SCN_LOG_PATH=$SASUNIT_PROJECTROOT/${{ inputs.language }}/scn_logs >> $GITHUB_ENV
       echo SASUNIT_REPORT_PATH=$SASUNIT_PROJECTROOT/${{ inputs.language }}/doc >> $GITHUB_ENV
       echo SASUNIT_RESOURCE_PATH=$SASUNIT_ROOT/resources >> $GITHUB_ENV
       echo SASUNIT_RUNALL=$SASUNIT_PROJECTROOT/saspgm/test/run_all.sas >> $GITHUB_ENV


    - name: Set paths (Windows)
      if: runner.os == 'Windows'
      shell: ${{ inputs.shell }}
      run: |
       echo SASUNIT_SAS_EXE="C:/Program` Files/SASHome2/SASFoundation/${{ env.SASUNIT_SAS_VERSION }}/sas.exe" >> $Env:GITHUB_ENV
       echo SASUNIT_SAS_CFG="C:/Program` Files/SASHome2/SASFoundation/${{ env.SASUNIT_SAS_VERSION }}/nls/${{ inputs.language }}/sasv9.cfg" >> $Env:GITHUB_ENV
       echo SASUNIT_TESTDB_PATH="${{ env.SASUNIT_PROJECTROOT }}/${{ inputs.language }}/testdb" >> $Env:GITHUB_ENV
       echo SASUNIT_LOG_PATH="${{ env.SASUNIT_PROJECTROOT }}/${{ inputs.language }}/logs" >> $Env:GITHUB_ENV
       echo SASUNIT_SCN_LOG_PATH="${{ env.SASUNIT_PROJECTROOT }}/${{ inputs.language }}/scn_logs" >> $Env:GITHUB_ENV
       echo SASUNIT_REPORT_PATH="${{ env.SASUNIT_PROJECTROOT }}/${{ inputs.language }}/doc" >> $Env:GITHUB_ENV
       echo SASUNIT_RESOURCE_PATH="${{ env.SASUNIT_ROOT }}/resources" >> $Env:GITHUB_ENV
       echo SASUNIT_RUNALL="${{ env.SASUNIT_PROJECTROOT }}/saspgm/test/run_all.sas" >> $Env:GITHUB_ENV
    
    - name: Creating script files for starting SASUnit (Linux)
      if: runner.os == 'Linux'
      shell: ${{ inputs.shell }}
      run: |
        $SASUNIT_SAS_EXE -nosyntaxcheck -noovp -log "$SASUNIT_PROJECTROOT/bin/sasunit.setup.$SASUNIT_SAS_VERSION.${{ inputs.language }}.log" -sysin "$SASUNIT_ROOT/saspgm/sasunit/runsasunitsetup.sas"
        ls bin

    - name: Creating script files for starting SASUnit (Windows)
      if: runner.os == 'Windows'
      shell: ${{ inputs.shell }}
      run: |
        Invoke-Expression -Command 'C:/Program` Files/SASHome2/SASFoundation/${{ env.SASUNIT_SAS_VERSION }}/sas.exe -CONFIG "${{ env.SASUNIT_SAS_CFG }}" -no$syntaxcheck -noovp -nosplash -log "${{env.SASUNIT_PROJECTROOT}}/bin/sasunit.setup.${{env.SASUNIT_SAS_VERSION}}.${{ inputs.language }}.log" -sysin "${{ env.SASUNIT_ROOT }}/saspgm/sasunit/runsasunitsetup.sas"'
        echo $?
        ls bin
