
name: Setting Execution Rights of Shell Scripts

inputs:
  dir:
    default: "."

runs:
  using: "composite"
  steps:
    - name: Set execution rights
      shell: bash
      run: |
        chmod a+x ${{ inputs.dir }}/bin/sasunit.setup.EE_CI_CentOS*sh
        chmod a+x ${{ inputs.dir }}/example/bin/sasunit.setup.EE_CI_CentOS*sh
        chmod a+x ${{ inputs.dir }}/saspgm/sasunit/linux/assert*.sh
        chmod a+x ${{ inputs.dir }}/saspgm/sasunit/unix_aix/assert*.sh
