
on:
  push:
    branches:
      - '**'

env:
  WORKSPACE: ${{ github.workspace }}
  RUN_NUMBER: ${{ github.run_number }}

permissions: 
  contents: read
  pages: write
  id-token: write
  checks: write

jobs:
  tests:
    name: Run Self Tests
    strategy:
      fail-fast: false
      matrix:
        language: [en]
        platform: [WIN10, CentOS]
        include:
          - platform: WIN10
            extension: cmd
            gh_internal_ext: ps1 # the extension used by pipeline scripts
            runner: SASUnit_WIN10
            osName: windows
          - platform: CentOS
            extension: sh
            gh_internal_ext: sh # the extension used by pipeline scripts
            runner: SASUnit_CentOS
            osName: linux

    env:
      LANGUAGE: ${{ matrix.language }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v3
      
      - if: ${{ matrix.platform == 'CentOS' }}
        uses: ./.github/actions/trim_line_endings
      - if: ${{ matrix.platform == 'CentOS' }}
        uses: ./.github/actions/set_execution_rights
 
      - name: Self Test
        run: |
          ./bin/sasunit.setup.EE_CI_${{ matrix.platform }}.${{ matrix.extension }} ${{ matrix.language }}
          ./bin/sasunit.9.4.${{ matrix.osName }}.${{ matrix.language }}.fast.${{ matrix.extension }}
          # ./bin/sasunit.9.4.${{ matrix.osName }}.${{ matrix.language }}.overwrite.full.${{ matrix.extension }} 
          
      - name: Example Test
        run: |
          ./example/bin/sasunit.setup.EE_CI_${{ matrix.platform }}.${{ matrix.extension }} ${{ matrix.language }}
          ./example/bin/sasunit.9.4.${{ matrix.osName }}.${{ matrix.language }}.overwrite.full.${{ matrix.extension }}

      - name: Move output to share
        run: |
          ./.github/scripts/copy_to_p_drive.${{ matrix.gh_internal_ext }} ${{ matrix.language }}/doc ${{ matrix.osName }}_${{ matrix.language }}
          ./.github/scripts/copy_to_p_drive.${{ matrix.gh_internal_ext }} ${{ matrix.language }}/logs ${{ matrix.osName }}_${{ matrix.language }}
          ./.github/scripts/copy_to_p_drive.${{ matrix.gh_internal_ext }} example/${{ matrix.language }}/doc ${{ matrix.osName }}_${{ matrix.language }}/example
          ./.github/scripts/copy_to_p_drive.${{ matrix.gh_internal_ext }} example/${{ matrix.language }}/logs ${{ matrix.osName }}_${{ matrix.language }}/example


      - name: Junit Report
        uses: dorny/test-reporter@v1
        with:
          name: Test Report (${{ matrix.osName }}, ${{ matrix.language }})
          path: "**/junit.xml"
          reporter: java-junit
          # work-around: if this is > 0, the action checks for tracked files
          # but git is not installed on our nodes
          max-annotations: '0'
          fail-on-error: false

