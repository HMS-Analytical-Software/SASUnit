
on:
  push:
    branches:
      - '**'

env:
  WORKSPACE: ${{ github.workspace }}


permissions: 
  contents: read
  pages: write
  id-token: write
  checks: write


jobs:
  tests:
    name: Run Self Tests
    strategy:
      fail-fast: false
      matrix:
        language: [en, de]
        platform: [WIN10, CentOS]
        include:
          - platform: WIN10
            extension: cmd
            runner: Windows
            osName: windows
          - platform: CentOS
            extension: sh
            runner: Linux
            osName: linux

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
 
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v3
      
      - if: ${{ matrix.platform == 'CentOS' }}
        uses: ./.github/actions/trim_line_endings
      - if: ${{ matrix.platform == 'CentOS' }}
        uses: ./.github/actions/set_execution_rights
 
