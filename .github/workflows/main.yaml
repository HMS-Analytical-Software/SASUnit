
on:
  push:
    branches:
      - '**'

env:
  WORKSPACE: ${{ github.workspace }}

jobs:
  test:
    name: Run Self Tests
    continue-on-error: true
    strategy:
      matrix:
        version: ["9.4"]
        language: [en]
        platform: [WIN10, CentOS]
        include:
          - platform: WIN10
            extension: cmd
            runner: Windows
            osName: windows
          - platform: CentOS
            extension: sh
            runner: Linux
            osName: linux
 
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v3
      
      - if: ${{ matrix.platform == 'CentOS' }}
        uses: ./.github/actions/trim_line_endings
      - if: ${{ matrix.platform == 'CentOS' }}
        uses: ./.github/actions/set_execution_rights
 
      - name: Self Test
        run: |
          ./bin/sasunit.setup.EE_CI_${{ matrix.platform }}.${{ matrix.extension }} ${{ matrix.language }}
          ./bin/sasunit.${{ matrix.version }}.${{ matrix.osName }}.${{ matrix.language }}.fast.${{ matrix.extension }}
          ./bin/sasunit.${{ matrix.version }}.${{ matrix.osName }}.${{ matrix.language }}.overwrite.full.${{ matrix.extension }} 
          
      - name: Example Test
        run: |
          ./example/bin/sasunit.setup.EE_CI_${{ matrix.platform }}.${{ matrix.extension }} ${{ matrix.language }}
          ./example/bin/sasunit.9.4.${{ matrix.osName }}.${{ matrix.language }}.overwrite.full.${{ matrix.extension }}
 
      - name: Test Report
        uses: dorny/test-reporter@v1
        with:
          name: SelfTest
          path: **/junit.xml
          reporter: jest-junit
