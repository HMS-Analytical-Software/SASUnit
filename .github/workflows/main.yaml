
on:
  push:
    branches:
      - '**'

env:
  sasUnitVersion: "Self Test"
  sasUnitPath: "/usr/exchange/jenkins/workspace/00773_KF_SAS_SASUNIT/SASUnit_9.4_de_CentOS_en" # "C:\\jenkins1\\workspace\\00773_KF_SAS_SASUNIT\\SASUnit"
  WORKSPACE: ${{ github.workspace }}

jobs:
  test:
    name: Run Self Tests
    strategy:
      matrix:
        language: [en, de]
        platform: [CentOS]
        include:
          #- platform: WIN10
          #  extension: cmd
          #  runner: Windows
          #  os_name: windows
          - platform: CentOS
            extension: sh
            shell: bash
            runner: Linux
            os_name: linux
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v3
      - run:  env
      
      - if: ${{ matrix.platform == 'CentOS' }}
        uses: ./.github/actions/trim_line_endings
      - if: ${{ matrix.platform == 'CentOS' }}
        uses: ./.github/actions/set_execution_rights

      - uses: ./.github/actions/setup
        with:
          language: ${{ matrix.language }}
          shell: ${{ matrix.shell }}
      - run: example/bin/sasunit.setup.EE_CI_${{ matrix.platform }}.${{ matrix.extension }} ${{ matrix.language }}

      - uses: ./.github/actions/sas_unit
        with:
          sasUnitVersion: ${{ env.sasUnitVersion }}
          sasUnitPath: ${{ env.sasUnitPath }}
          script: bin/sasunit.9.4.${{ matrix.os_name }}.${{ matrix.language }}.fast.${{ matrix.extension }}
          shell: ${{ matrix.shell }}
      - uses: ./.github/actions/sas_unit
        with:
          sasUnitVersion: ${{ env.sasUnitVersion }}
          script: bin/sasunit.9.4.${{ matrix.os_name }}.${{ matrix.language }}.overwrite.full.${{ matrix.extension }}
          sasUnitPath: ${{ env.sasUnitPath }}
          shell: ${{ matrix.shell }}
      - uses: ./.github/actions/sas_unit
        with:
          sasUnitVersion: ${{ env.sasUnitVersion }}
          sasUnitPath: ${{ env.sasUnitPath }}
          script: example/bin/sasunit.9.4.${{ matrix.os_name }}.${{ matrix.language }}.overwrite.full.${{ matrix.extension }}
          shell: ${{ matrix.shell }}
      - uses: actions/upload-artifact@v3
        if: success() || failure()
        with:
          name: Logs and Test Results
          path: |
            "**/*run_all.log"
            "**/*junit.xml"
            ${{ matrix.language }}/doc/index.html
            example/${{ matrix.language }}/doc/index.html
          if-no-files-found: warn
      #- uses: dorny/test-reporter@v1
        #if: success() || failure()
          #with:
          #name: Test Report
            #path: "**/*junit.xml"
            #    reporter: java-junit
