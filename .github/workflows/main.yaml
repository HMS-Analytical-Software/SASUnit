
on:
  push:
    branches:
      - '**'

env:
  sasUnitVersion: "some_path"

jobs:
  test:
    name: Run Self Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [en, de]
    steps:
      - uses: actions/checkout@v3
      - uses: ./.github/actions/trim_line_endings
      - uses: ./.github/actions/set_execution_rights
      - run: |
          ls
          bin/sasunit.setup.EE_CI_CentOS.${{ matrix.language }}.sh
      - run: example/bin/sasunit.setup.EE_CI_CentOS.${{ matrix.language }}.sh

      - uses: ./.github/actions/sas_unit
        with:
          sasUnitVersion: ${{ env.sasUnitVersion }}
          script: bin/sasunit.9.4.${{ matrix.language }}.fast.sh
      - uses: ./.github/actions/sas_unit
        with:
          sasUnitVersion: ${{ env.sasUnitVersion }}
          script: bin/sasunit.9.4.linux.${{ matrix.language }}.overwrite.full.sh
      - uses: ./.github/actions/sas_unit
        with:
          sasUnitVersion: ${{ env.sasUnitVersion }}
          script: example/bin/sasunit.9.4.linux.de.overwrite.full.sh

      - uses: actions/upload-artifact@v3
        if: success() || failure()
        with:
          name: Logs and Test Results
          path: |
            "**/*run_all.log"
            "**/*junit.xml"
            ${{ matrix.language }}/doc/index.html
            example/${{ matrix.language }}/doc/index.html
          if-no-files-found: warn
      - uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Test Report
          path: "**/*junit.xml"
          reporter: java-junit
