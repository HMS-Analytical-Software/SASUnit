
on:
  push:
    branches:
      - '**'

jobs:
  test:
    name: Run Self Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [en, de]
    steps:
      - uses: actions/checkout@v3
      - name: Remove Line Endings
        run: |
          ls
          sed -i -e "s/\r//g" example/saspgm/*.sas
          sed -i -e 's/\r//g' saspgm/sasunit/*.sas
          sed -i -e 's/\r//g' saspgm/sasunit/*.txt
          sed -i -e 's/\r//g' saspgm/sasunit/linux/*.sas
          sed -i -e 's/\r//g' saspgm/sasunit/linux/*.sh
          sed -i -e 's/\r//g' saspgm/sasunit/unix_aix/*.sas
          sed -i -e 's/\r//g' saspgm/sasunit/unix_aix/*.sh
          sed -i -e 's/\r//g' dat/*.txt
          sed -i -e 's/\r//g' dat/*.xml 
      - name: Set execution rights
        run: |
          chmod a+x bin/sasunit.setup.EE_CI_CentOS*sh
          chmod a+x example/bin/sasunit.setup.EE_CI_CentOS*sh
          chmod a+x saspgm/sasunit/linux/assert*.sh
          chmod a+x saspgm/sasunit/unix_aix/assert*.sh
      - run: cd bin && ./sasunit.setup.EE_CI_CentOS.${{ matrix.language }}.sh
      # - SASUnit Plugin: Selftest, bin/sasunit.9.4.de.fast.sh
      # - SASUnit Plugin: Selftest, bin/sasunit.9.4.linux.de.overwrite.full.sh
      - run: cd example/bin && ./sasunit.setup.EE_CI_CentOS.${{ matrix.language }}.sh
      # - SASUnit Plugin: Selftest, example/bin/sasunit.9.4.linux.de.overwrite.full.sh
      # - archive: **/*run_all.log,**/*junit.xml
      # - html report: de/doc/index.html
      # - html report: example/de/doc/index.html
      # - junit results **/*junit.xml