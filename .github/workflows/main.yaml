  release:
    name: Build Release Zip
    continue-on-error: true
    strategy:
      matrix:
        platform: [CentOS]
        include:
          - platform: CentOS
            runner: Linux
            osName: linux

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v3
      - if: ${{ matrix.platform == 'CentOS' }}
        uses: ./.github/actions/trim_line_endings
      - if: ${{ matrix.platform == 'CentOS' }}
        uses: ./.github/actions/set_execution_rights

      - name: Run examples
        run: |
          ./example/bin/sasunit.setup.EE_CI_CentOS.sh de
          ./example/bin/sasunit.setup.EE_CI_CentOS.sh en
          ./example/bin/sasunit.9.4.linux.de.overwrite.full.sh
          ./example/bin/sasunit.9.4.linux.en.overwrite.full.sh
      - name: Build ZIP File
        run: |
          # TODO if [ ${SVN_TAG:0:4} = tags ]; then SVN_TAG=${SVN_TAG:5} fi
          export SVN_TAG=9.4
          zip -r sasunit.$SVN_TAG.${{ matrix.osName }}.zip \
            example/* \
            saspgm/sasunit/* \
            resources/* \
            saspgm/template/* \
            *.txt \
            -exclude \
              \*.sv* \
              sasunit.setup.EE_\* \
              sasunit.9.4.linux.\* \
              \*.xml \
              \*.log \
              \*.cmd \
              ./example/de/testdb/\*.sas7bdat \
              ./example/en/testdb/*.sas7bdat \
              ./resources/style/*.sas7bitm

          zip -T sasunit.$SVN_TAG.${{ matrix.osName }}.zip

